<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <title>Doi Diem - Voucher</title>
</head>

<body>
    <section layout:fragment="content" class="container py-4" style="max-width: 820px;">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <h4 class="fw-bold mb-3"><i class="bi bi-gift-fill text-danger"></i> Tra cuu diem va doi voucher</h4>

                <form method="get" action="/rewards" class="row g-2 align-items-end mb-3">
                    <div class="col-md-8">
                        <label class="form-label fw-semibold">So dien thoai</label>
                        <input type="tel" class="form-control" name="phone" th:value="${phone}"
                            placeholder="Nhap so dien thoai de tra cuu diem" required>
                    </div>
                    <div class="col-md-4">
                        <button class="btn btn-dark w-100" type="submit">Tra cuu diem</button>
                    </div>
                </form>

                <div class="alert alert-warning mb-3">
                    Diem hien tai: <span class="fw-bold fs-5" th:text="${points}">0</span>
                </div>

                <form method="post" action="/rewards/request-otp" class="mb-4">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" name="phone" th:value="${phone}">
                    <div class="d-flex flex-wrap gap-2">
                        <button class="btn btn-danger" type="submit" name="amount" value="20000">
                            Doi 1000 diem -> Voucher 20.000d
                        </button>
                        <button class="btn btn-danger" type="submit" name="amount" value="30000">
                            Doi 2000 diem -> Voucher 30.000d
                        </button>
                        <button class="btn btn-danger" type="submit" name="amount" value="35000">
                            Doi 3000 diem -> Voucher 35.000d
                        </button>
                        <a href="/cart" class="btn btn-outline-dark">Den gio hang de dung voucher</a>
                    </div>
                </form>

                <div class="card border-warning mb-4" th:if="${otpPending}">
                    <div class="card-body">
                        <h6 class="fw-bold mb-2">Xac thuc OTP de doi voucher</h6>
                        <form method="post" action="/rewards/redeem" class="row g-2">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <input type="hidden" name="phone" th:value="${otpPhone}">
                            <input type="hidden" name="amount" th:value="${otpAmount}">
                            <div class="col-md-8">
                                <input type="text" class="form-control" name="otpCode"
                                    placeholder="Nhap OTP 6 so" required>
                            </div>
                            <div class="col-md-4">
                                <button class="btn btn-dark w-100" type="submit">Xac nhan doi</button>
                            </div>
                        </form>
                    </div>
                </div>

                <h6 class="fw-bold mb-2">Voucher cua ban</h6>
                <div class="table-responsive">
                    <table class="table table-bordered align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th style="width: 60px;">#</th>
                                <th>Ma voucher</th>
                                <th>Gia tri</th>
                                <th>Trang thai</th>
                                <th style="width: 170px;">Hanh dong</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(vouchers)}">
                                <td colspan="5" class="text-center text-muted">Chua co voucher nao.</td>
                            </tr>
                            <tr th:each="v, stat : ${vouchers}">
                                <td th:text="${stat.count}">1</td>
                                <td class="fw-bold" th:text="${v.code}">PV20000-XXXX</td>
                                <td th:text="${#numbers.formatDecimal(v.discountAmount,0,'COMMA',0,'POINT')} + 'd'">
                                    10.000d</td>
                                <td>
                                    <span th:if="${v.used}" class="badge bg-secondary">Da dung</span>
                                    <span th:unless="${v.used}" class="badge bg-success">Chua dung</span>
                                </td>
                                <td>
                                    <a th:if="${!v.used}" th:href="@{/cart(voucher=${v.code})}"
                                        class="btn btn-sm btn-outline-danger">Dung ngay</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
