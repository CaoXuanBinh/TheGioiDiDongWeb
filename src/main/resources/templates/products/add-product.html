<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <section layout:fragment="head">
        <title>Thêm/Sửa Sản Phẩm</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </section>
</head>

<body>
    <section layout:fragment="content" class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h3 class="card-title mb-0" th:text="${product.id} ? 'Cập Nhật Sản Phẩm' : 'Thêm Mới Sản Phẩm'">
                            Form Sản Phẩm</h3>
                    </div>
                    <div class="card-body">
                        <form th:action="${product.id} ? @{/products/update/{id}(id=${product.id})} : @{/products/add}"
                            th:object="${product}" method="post" enctype="multipart/form-data">

                            <div class="mb-3">
                                <label for="name" class="form-label">Tên sản phẩm</label>
                                <input type="text" class="form-control" id="name" th:field="*{name}" required>
                            </div>

                            <div class="mb-3">
                                <label for="category" class="form-label">Loại sản phẩm:</label>
                                <select id="category" name="category" class="form-control" th:field="*{category}">
                                    <option value="">-- Chọn loại sản phẩm --</option>
                                    <option th:each="category : ${categories}" th:value="${category.id}"
                                        th:text="${category.name}"></option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="price" class="form-label">Giá (VNĐ)</label>
                                <input type="number" class="form-control" id="price" th:field="*{price}" required>
                            </div>

                            <div class="mb-3">
                                <label for="stockQuantity" class="form-label">Số lượng tồn kho</label>
                                <input type="number" class="form-control" id="stockQuantity" th:field="*{stockQuantity}"
                                    min="0" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold text-danger">
                                    <i class="bi bi-lightning-fill"></i> Chương trình khuyến mãi:
                                </label>
                                <div class="form-check">
                                    <input class="form-check-input promo-radio" type="radio" name="promotionType"
                                        id="promoNone" value="NONE" th:field="*{promotionType}">
                                    <label class="form-check-label" for="promoNone">Không</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input promo-radio" type="radio" name="promotionType"
                                        id="promoDiscount" value="DISCOUNT" th:field="*{promotionType}">
                                    <label class="form-check-label" for="promoDiscount">Giảm giá</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input promo-radio" type="radio" name="promotionType"
                                        id="promoGift" value="GIFT" th:field="*{promotionType}">
                                    <label class="form-check-label" for="promoGift">Quà tặng</label>
                                </div>
                            </div>

                            <div class="mb-3" id="discountPercentDiv" style="display: none;">
                                <label for="discountPercent" class="form-label text-danger">Phần trăm giảm giá
                                    (%)</label>
                                <input type="number" class="form-control" id="discountPercent"
                                    th:field="*{discountPercent}" min="0" max="100">
                            </div>

                            <div class="mb-3" id="giftDescriptionDiv" style="display: none;">
                                <label for="giftDescription" class="form-label text-danger">Mô tả quà tặng</label>
                                <input type="text" class="form-control" id="giftDescription"
                                    th:field="*{giftDescription}" placeholder="VD: Tặng tai nghe Bluetooth">
                            </div>

                            <div class="mb-3">
                                <label for="image" class="form-label">Hình ảnh</label>
                                <input type="file" class="form-control" id="image" name="imageFile" accept="image/*">
                                <div th:if="${product.image}" class="mt-2">
                                    <img th:src="@{'/images/' + ${product.image}}" alt="Current Image" width="100"
                                        class="img-thumbnail">
                                    <p class="text-muted small">Ảnh hiện tại</p>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="description" class="form-label">Mô tả</label>
                                <textarea class="form-control" id="description" th:field="*{description}"
                                    rows="3"></textarea>
                            </div>

                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <a href="/products" class="btn btn-secondary me-md-2">Quay lại</a>
                                <button type="submit" class="btn btn-primary"
                                    th:text="${product.id} ? 'Cập Nhật' : 'Lưu Sản Phẩm'">Lưu</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

        <script>
            document.addEventListener('DOMContentLoaded', function () {
                const promoRadios = document.querySelectorAll('.promo-radio');
                const discountDiv = document.getElementById('discountPercentDiv');
                const discountInput = document.getElementById('discountPercent');
                const giftDiv = document.getElementById('giftDescriptionDiv');
                const giftInput = document.getElementById('giftDescription');

                function toggleFields() {
                    let selectedType = 'NONE';
                    promoRadios.forEach(radio => {
                        if (radio.checked) selectedType = radio.value;
                    });

                    // Tùy chỉnh hiển thị theo loại khuyến mãi
                    if (selectedType === 'DISCOUNT') {
                        discountDiv.style.display = 'block';
                        giftDiv.style.display = 'none';
                        if (giftInput) giftInput.value = ''; // Xóa Quà tặng nếu chọn Giảm giá
                    } else if (selectedType === 'GIFT') {
                        giftDiv.style.display = 'block';
                        discountDiv.style.display = 'none';
                        if (discountInput) discountInput.value = 0; // Xóa Giảm giá nếu chọn Quà tặng
                    } else {
                        // NONE
                        discountDiv.style.display = 'none';
                        giftDiv.style.display = 'none';
                        if (discountInput) discountInput.value = 0;
                        if (giftInput) giftInput.value = '';
                    }
                }

                promoRadios.forEach(radio => {
                    radio.addEventListener('change', toggleFields);
                });

                toggleFields(); // Set initial state
            });
        </script>
    </section>

</body>

</html>
