<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - TheGioiDiDong Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css?v=2">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }

        .login-card {
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.12);
            border: none;
        }

        .login-header {
            background: #febf05;
            border-radius: 16px 16px 0 0;
            padding: 2rem;
            text-align: center;
        }

        .btn-login {
            background: #febf05;
            border: none;
            color: #222;
            font-weight: 700;
        }

        .btn-login:hover {
            background: #e5ab00;
            color: #222;
        }
    </style>
</head>

<body class="d-flex align-items-center">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card login-card">
                    <div class="login-header">
                        <a href="/" class="text-decoration-none text-dark">
                            <h3 class="fw-bold mb-0">🛒 TheGioiDiDong Shop</h3>
                        </a>
                        <p class="text-muted mb-0 mt-1">Đăng nhập vào tài khoản của bạn</p>
                    </div>
                    <div class="card-body p-4">
                        <!-- Thông báo lỗi -->
                        <div th:if="${errorMessage}" class="alert alert-danger d-flex align-items-center" role="alert">
                            <i class="bi bi-exclamation-triangle-fill me-2"></i>
                            <span th:text="${errorMessage}"></span>
                        </div>
                        <!-- Thông báo đăng xuất -->
                        <div th:if="${logoutMessage}" class="alert alert-success d-flex align-items-center"
                            role="alert">
                            <i class="bi bi-check-circle-fill me-2"></i>
                            <span th:text="${logoutMessage}"></span>
                        </div>
                        <!-- Thông báo đăng ký thành công -->
                        <div th:if="${param.registered}" class="alert alert-success" role="alert">
                            <i class="bi bi-check-circle-fill me-2"></i>
                            Đăng ký thành công! Vui lòng đăng nhập.
                        </div>

                        <form th:action="@{/login}" method="post">
                            <div class="mb-3">
                                <label for="username" class="form-label fw-semibold">
                                    <i class="bi bi-person me-1"></i>Tên đăng nhập
                                </label>
                                <input type="text" class="form-control" id="username" name="username"
                                    placeholder="Nhập tên đăng nhập" required autofocus>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label fw-semibold">
                                    <i class="bi bi-lock me-1"></i>Mật khẩu
                                </label>
                                <div class="input-group">
                                    <input type="password" class="form-control" id="password" name="password"
                                        placeholder="Nhập mật khẩu" required>
                                    <button class="btn btn-outline-secondary" type="button"
                                        onclick="togglePassword('password', this)">
                                        <i class="bi bi-eye"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="d-grid mt-4">
                                <button type="submit" class="btn btn-login btn-lg">
                                    <i class="bi bi-box-arrow-in-right me-2"></i>Đăng nhập
                                </button>
                            </div>
                        </form>

                        <hr class="my-3">
                        <p class="text-center mb-0">
                            Chưa có tài khoản?
                            <a href="/register" class="fw-semibold text-decoration-none" style="color:#e5ab00;">
                                Đăng ký ngay
                            </a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (input.type === "password") {
                input.type = "text";
                icon.className = "bi bi-eye-slash";
            } else {
                input.type = "password";
                icon.className = "bi bi-eye";
            }
        }
    </script>
</body>

</html>
