<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <title>Sửa Danh Mục</title>
</head>

<body>
    <section layout:fragment="content" class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-warning text-dark py-3">
                        <h4 class="mb-0 text-center text-uppercase fw-bold">SỬA DANH MỤC</h4>
                    </div>
                    <div class="card-body p-4 bg-white">
                        <form th:action="@{/admin/categories/update/{id}(id=${category.id})}" th:object="${category}"
                            method="post" enctype="multipart/form-data">

                            <!-- Tên danh mục -->
                            <div class="mb-3">
                                <label for="name" class="form-label fw-bold">Tên danh mục:</label>
                                <input type="text" th:field="*{name}" class="form-control" id="name" required>
                            </div>

                            <!-- Nhóm danh mục cha -->
                            <div class="mb-3">
                                <label for="parentCategory" class="form-label fw-bold">Nhóm (Cho menu Phụ kiện):</label>
                                <select th:field="*{parentCategory}" class="form-select" id="parentCategory">
                                    <option value="">-- Không có nhóm (Là danh mục gốc) --</option>
                                    <option th:each="cat : ${rootCategories}" th:value="${cat.id}"
                                        th:text="${cat.name}"></option>
                                </select>
                            </div>

                            <!-- Icon -->
                            <div class="mb-3">
                                <label for="icon" class="form-label fw-bold">Icon (Bootstrap Icon - e.g.
                                    bi-phone):</label>
                                <input type="text" th:field="*{icon}" class="form-control" id="icon">
                            </div>

                            <!-- Hình ảnh danh mục -->
                            <div class="mb-4">
                                <label for="imageFile" class="form-label fw-bold">Cập nhật Hình ảnh (để trống nếu giữ
                                    nguyên):</label>
                                <input type="file" name="imageFile" class="form-control" id="imageFile"
                                    accept="image/png, image/jpeg, image/gif">
                                <div th:if="${category.image != null and category.image != ''}"
                                    class="mt-2 text-center">
                                    <p class="mb-1 text-muted small">Ảnh hiện tại:</p>
                                    <img th:src="@{'/images/' + ${category.image}}"
                                        style="max-width: 150px; border-radius:4px; border:1px solid #ddd; padding:4px;">
                                </div>
                            </div>

                            <div class="d-flex gap-2">
                                <a href="/admin/categories" class="btn btn-secondary flex-grow-1">Hủy bỏ</a>
                                <button type="submit" class="btn btn-danger flex-grow-1 fw-bold text-uppercase">CẬP NHẬT
                                    DANH MỤC</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
