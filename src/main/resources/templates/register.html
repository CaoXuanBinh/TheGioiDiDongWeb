<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - TheGioiDiDong Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css?v=2">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }

        .register-card {
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.12);
            border: none;
        }

        .register-header {
            background: #febf05;
            border-radius: 16px 16px 0 0;
            padding: 1.5rem 2rem;
            text-align: center;
        }

        .btn-register {
            background: #febf05;
            border: none;
            color: #222;
            font-weight: 700;
        }

        .btn-register:hover {
            background: #e5ab00;
            color: #222;
        }
    </style>
</head>

<body class="d-flex align-items-center">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card register-card">
                    <div class="register-header">
                        <a href="/" class="text-decoration-none text-dark">
                            <h3 class="fw-bold mb-0">🛒 TheGioiDiDong Shop</h3>
                        </a>
                        <p class="text-muted mb-0 mt-1">Tạo tài khoản mới</p>
                    </div>
                    <div class="card-body p-4">

                        <!-- Thông báo lỗi từ controller -->
                        <div th:if="${errorMessage}" class="alert alert-danger d-flex align-items-center" role="alert">
                            <i class="bi bi-exclamation-triangle-fill me-2"></i>
                            <span th:text="${errorMessage}"></span>
                        </div>

                        <form th:action="@{/register}" th:object="${user}" method="post" novalidate>
                            <div class="mb-3">
                                <label for="username" class="form-label fw-semibold">
                                    <i class="bi bi-person me-1"></i>Tên đăng nhập <span class="text-danger">*</span>
                                </label>
                                <input type="text" class="form-control" id="username" name="username"
                                    th:value="*{username}" placeholder="Nhập tên đăng nhập" required>
                                <div class="text-danger small" th:if="${#fields.hasErrors('username')}"
                                    th:errors="*{username}"></div>
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label fw-semibold">
                                    <i class="bi bi-envelope me-1"></i>Email <span class="text-danger">*</span>
                                </label>
                                <input type="email" class="form-control" id="email" name="email" th:value="*{email}"
                                    placeholder="Nhập email" required>
                                <div class="text-danger small" th:if="${#fields.hasErrors('email')}"
                                    th:errors="*{email}"></div>
                            </div>

                            <div class="mb-3">
                                <label for="phone" class="form-label fw-semibold">
                                    <i class="bi bi-phone me-1"></i>Số điện thoại
                                </label>
                                <input type="tel" class="form-control" id="phone" name="phone" th:value="*{phone}"
                                    placeholder="Nhập số điện thoại (tuỳ chọn)">
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label fw-semibold">
                                    <i class="bi bi-lock me-1"></i>Mật khẩu <span class="text-danger">*</span>
                                </label>
                                <div class="input-group">
                                    <input type="password" class="form-control" id="password" name="password"
                                        placeholder="Nhập mật khẩu (ít nhất 6 ký tự)" required minlength="6">
                                    <button class="btn btn-outline-secondary" type="button"
                                        onclick="togglePassword('password', this)">
                                        <i class="bi bi-eye"></i>
                                    </button>
                                </div>
                                <div class="text-danger small" th:if="${#fields.hasErrors('password')}"
                                    th:errors="*{password}"></div>
                                <div class="form-text">Mật khẩu ít nhất 6 ký tự.</div>
                            </div>

                            <div class="d-grid mt-4">
                                <button type="submit" class="btn btn-register btn-lg">
                                    <i class="bi bi-person-plus me-2"></i>Đăng ký
                                </button>
                            </div>
                        </form>

                        <hr class="my-3">
                        <p class="text-center mb-0">
                            Đã có tài khoản?
                            <a href="/login" class="fw-semibold text-decoration-none" style="color:#e5ab00;">
                                Đăng nhập ngay
                            </a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (input.type === "password") {
                input.type = "text";
                icon.className = "bi bi-eye-slash";
            } else {
                input.type = "password";
                icon.className = "bi bi-eye";
            }
        }
    </script>
</body>

</html>
